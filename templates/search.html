{% extends "base.html" %}
{% block content %}
<h2>User Comment Search</h2>

<form method="POST">
  <input type="text" name="q" placeholder="username" value="{{ q }}" required>
  <button type="submit">Search</button>
</form>

<hr>

{% if results %}
  {% for r in results %}
    <div style="margin-bottom:10px;">
      <b>{{ r.username }}</b> ({{ r.created_at }}): {{ r.content }}
    </div>
  {% endfor %}
{% else %}
  <p>No results.</p>
{% endif %}
{% endblock %}
